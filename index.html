<!DOCTYPE html>
<html>

<head>
    <title>Password</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Georgia, serif;
            color: white;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 42px;
            font-weight: normal;
            margin-bottom: 30px;
        }

        input {
            width: 280px;
            padding: 12px;
            background: transparent;
            border: 1px solid white;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        input::placeholder {
            color: #888;
        }

        button {
            margin-top: 20px;
            padding: 12px 35px;
            background: white;
            color: black;
            border: none;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }

        button:hover {
            background: #dddddd;
        }
    </style>

</head>

    <script>
function checkPassword() {
    let password = document.getElementById("password").value;

    if (password === "Prince") {
       document.querySelector("svg").style.transform = "scale(8)";
document.querySelector("svg").style.transition = "1.2s";

setTimeout(function () {
    document.body.style.transition = "1s";
    document.body.style.opacity = "0";
}, 700);
    } else {
        alert("Try again.");
    }
}
</script>
<body>
<div class="container">

    <svg id="lock" width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">


        <rect x="5" y="11" width="14" height="10" rx="2"></rect>
<path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
</svg>
    <h1>Password</h1>

       <input type="password" id="password" placeholder="Enter password">

        <br>

        <button onclick="checkPassword()">Enter</button>

    </div>

</body>

</html>
