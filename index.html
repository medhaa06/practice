<!DOCTYPE html>
<html>

<head>
    <title>Password</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Georgia, serif;
            color: white;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 42px;
            font-weight: normal;
            margin-bottom: 30px;
        }

        input {
            width: 280px;
            padding: 12px;
            background: transparent;
            border: 1px solid white;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        input::placeholder {
            color: #888;
        }

        button {
            margin-top: 20px;
            padding: 12px 35px;
            background: white;
            color: black;
            border: none;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }

        button:hover {
            background: #dddddd;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Password</h1>

        <input type="password" placeholder="Enter password">

        <br>

        <button>Unlock</button>

    </div>

</body>

</html>
